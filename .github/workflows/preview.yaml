on:
  pull_request:
    types:
      - opened

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@master

    - name: Login
      uses: okteto/actions/login@master
      with:
        token: ${{ secrets.OKTETO_TOKEN }}

    - name: Deploy Application
      uses: okteto/actions/pipeline@master
      with:
        namespace: ifbyol
        name: pr-${{ github.event.number }}

