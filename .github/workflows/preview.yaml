on: [push]

jobs:
  preview:
    runs-on: self-hosted
    container:
      image: ubuntu:20.04
      options: --user 1002
    steps:
    - name: checkout
      uses: actions/checkout@master

    - name: Login
      uses: okteto/login@debug
      with:
        token: ${{ secrets.OKTETO_TOKEN }}
        url: ${{ secrets.OKTETO_URL }}

    - name: Deploy Application
      uses: okteto/pipeline@master
      with:
        namespace: ifbyol

